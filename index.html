<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

window.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");

  const firebaseConfig = {
    databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const base = "https://raw.githubusercontent.com/RSCCT/FGTC328/main/";

  const videos = {
    idle: base + "idle.mp4",
    idle2: base + "idle2.mp4"
  };

  function playVideo(name) {
    const url = videos[name];
    if (!url) return;

    video.pause();
    video.src = url + "?t=" + Date.now();
    video.load();
    video.play().catch(() => {});
  }

  const stateRef = ref(db, "state");

  onValue(stateRef, (snapshot) => {
    const state = snapshot.val();
    console.log("Firebase:", state);
    playVideo(state);
  });

});

</script>
