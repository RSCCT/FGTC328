<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Video Control</title>

  <!-- 🎨 全螢幕樣式 -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* 🔥 滿版顯示 */
      background: black;
    }

    #testBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- 🎬 全螢幕影片 -->
<video id="video" autoplay muted playsinline></video>

<!-- 🔘 測試按鈕 -->
<button id="testBtn" onclick="testPlay()">測試播放</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

window.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");

  console.log("video element:", video);

  // 🔥 Firebase 設定
  const firebaseConfig = {
    databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🔥 影片來源（已修正可播放）
  const base = "https://github.com/RSCCT/FGTC328/raw/main/";

  const videos = {
    idle: base + "idle.mp4",
    idle2: base + "idle2.mp4"
  };

  function playVideo(name) {

    console.log("播放狀態:", name);

    const url = videos[name];

    if (!url) {
      console.log("❌ 找不到影片:", name);
      return;
    }

    // 🔥 強制刷新（避免卡住）
    video.pause();
    video.removeAttribute("src");
    video.load();

    video.src = url + "?t=" + Date.now();

    video.play().then(() => {
      console.log("✅ 播放成功");
    }).catch(err => {
      console.log("❌ 播放失敗:", err);
    });
  }

  // 🔥 Firebase 即時監聽
  const stateRef = ref(db, "state");

  onValue(stateRef, (snapshot) => {

    const state = snapshot.val();

    console.log("Firebase:", state);

    if (!state) return;

    playVideo(state);
  });

});

// 🔥 手動測試（確認影片 OK）
window.testPlay = function () {
  const video = document.getElementById("video");

  video.src = "https://github.com/RSCCT/FGTC328/raw/main/idle.mp4";

  video.play().then(() => {
    console.log("✅ 測試播放成功");
  }).catch(err => {
    console.log("❌ 測試播放失敗:", err);
  });
};

</script>

</body>
</html>
