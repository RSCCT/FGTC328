<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Video Control</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 🎯 固定容器（關鍵） */
    #container {
      width: 100vw;
      max-width: 480px;   /* 👉 手機固定寬度 */
      aspect-ratio: 9 / 16; /* 👉 直式比例（可改） */
      background: black;
      overflow: hidden;
      position: relative;
    }

    /* 🎬 影片填滿容器 */
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }
  </style>
</head>

<body>

<div id="container">
  <video id="video" autoplay muted playsinline preload="auto"></video>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

window.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");

  // 🔥 預設影片（避免閃動）
  video.src = "https://github.com/RSCCT/FGTC328/raw/main/idle.mp4";
  video.play().catch(() => {});

  // 🔥 Firebase
  const firebaseConfig = {
    databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const base = "https://github.com/RSCCT/FGTC328/raw/main/";

  const videos = {
    idle: base + "idle.mp4",
    idle2: base + "idle2.mp4"
  };

  function playVideo(name) {

    const url = videos[name];
    if (!url) return;

    // 👉 同影片不重播
    if (video.src.includes(url)) return;

    video.src = url + "?t=" + Date.now();
    video.play().catch(() => {});
  }

  const stateRef = ref(db, "state");

  onValue(stateRef, (snapshot) => {
    const state = snapshot.val();
    if (!state) return;

    playVideo(state);
  });

});

</script>

</body>
</html>
