<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ESP32 Video Player</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>

</head>

<body>

<video id="video" autoplay muted playsinline loop></video>

<script>
const video = document.getElementById("video");

// 👉 GitHub影片
const base = "https://raw.githubusercontent.com/RSCCT/FGTC328/main/";

const videos = {
  idle: base + "idle.mp4",
  idle2: base + "idle2.mp4"
};

function playVideo(name) {
  const url = videos[name];
  if (!url) return;

  video.pause();
  video.src = url + "?t=" + Date.now(); // 防快取
  video.load();

  video.play().catch(err => {});
}

let current = "";

// 👉 固定IP（你設定的）
const ESP32_URL = "http://172.20.10.2/state";

// 👉 每秒讀ESP32
setInterval(async () => {
  try {
    const res = await fetch(ESP32_URL);
    const text = await res.text();

    if (text !== current) {
      current = text;
      console.log("切換:", text);
      playVideo(text);
    }

  } catch (e) {
    console.log("連不到ESP32");
  }
}, 1000);

// 預設
playVideo("idle");

</script>

</body>
</html>
