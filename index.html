<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>角色訊息讀取後端連結</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background: #f9fafb;
    }

    h2 {
      text-align: center;
    }

    .box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #display {
      margin-top: 20px;
      font-size: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      min-height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

<h2>角色訊息讀取後端連結</h2>

<div class="box">
  <input id="msg" placeholder="輸入訊息...">
  <button onclick="send()">送出</button>
</div>

<div id="display">（尚未有訊息）</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAvn1cQRlonkZhV9mNK5DsPMPd4KQ2JZEM",
    authDomain: "fightgame-b7536.firebaseapp.com",
    databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/",
    projectId: "fightgame-b7536",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();

    if (!text) return;

    db.ref("message").set(text);
    input.value = "";
  }

  db.ref("message").on("value", (snapshot) => {
    document.getElementById("display").innerText =
      snapshot.val() || "（尚未有訊息）";
  });
</script>

</body>
</html>
