<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Video Control</title>

  <!-- 📱 手機全螢幕關鍵 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }
  </style>
</head>

<body>

<!-- 🎬 影片（預先佔滿畫面） -->
<video id="video" autoplay muted playsinline preload="auto"></video>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

window.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");

  // 🔥 先給一個預設影片（避免一開始縮小）
  video.src = "https://github.com/RSCCT/FGTC328/raw/main/idle.mp4";
  video.play().catch(() => {});

  // 🔥 Firebase
  const firebaseConfig = {
    databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const base = "https://github.com/RSCCT/FGTC328/raw/main/";

  const videos = {
    idle: base + "idle.mp4",
    idle2: base + "idle2.mp4"
  };

  function playVideo(name) {

    const url = videos[name];
    if (!url) return;

    // 🔥 無縫切換（不閃、不縮）
    if (video.src.includes(url)) return;

    video.pause();
    video.src = url + "?t=" + Date.now();

    video.play().catch(() => {});
  }

  const stateRef = ref(db, "state");

  onValue(stateRef, (snapshot) => {
    const state = snapshot.val();
    if (!state) return;

    playVideo(state);
  });

});

</script>

</body>
</html>
