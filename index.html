<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Screen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    height: 100vh;
    gap: 10px; /* 🔥 中間間隔 */
  }

  .player {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>

<body>

<div class="player">
  <video id="video1" autoplay muted playsinline></video>
</div>

<div class="player">
  <video id="video2" autoplay muted playsinline></video>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase
const firebaseConfig = {
  databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🎬 影片來源
const base = "https://github.com/RSCCT/FGTC328/raw/main/";

// 👉 影片命名規則（你之後照這樣放）
const videos = {
  A_idle: base + "idle.mp4",
  B_idle: base + "idle2.mp4",
  C_idle: base + "idle.mp4",

  A_win: base + "idle.mp4",
  B_win: base + "idle2.mp4",
  C_win: base + "idle.mp4",

  A_lose: base + "idle2.mp4",
  B_lose: base + "idle.mp4",
  C_lose: base + "idle2.mp4"
};

const v1 = document.getElementById("video1");
const v2 = document.getElementById("video2");

// 👉 播放函式
function play(video, key) {
  const url = videos[key];
  if (!url) return;

  if (video.src.includes(url)) return;

  video.src = url + "?t=" + Date.now();
  video.play().catch(()=>{});
}

// 🔥 監聽 Firebase
const refAll = ref(db, "/");

onValue(refAll, (snap) => {

  const data = snap.val();

  if (!data) return;

  const p1 = data.player1;
  const p2 = data.player2;
  const result = data.result;

  if (!p1 || !p2) return;

  // 🎯 判斷顯示狀態
  let state1 = "idle";
  let state2 = "idle";

  if (result === "P1") {
    state1 = "win";
    state2 = "lose";
  }
  else if (result === "P2") {
    state1 = "lose";
    state2 = "win";
  }
  else if (result === "S") {
    state1 = "idle";
    state2 = "idle";
  }

  // 🎬 播放
  play(v1, p1 + "_" + state1);
  play(v2, p2 + "_" + state2);

});

</script>

</body>
</html>
