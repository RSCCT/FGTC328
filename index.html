<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Screen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    height: 100vh;
    gap: 10px;
  }

  .player {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>

<body>

<div class="player">
  <video id="video1" autoplay muted playsinline></video>
</div>

<div class="player">
  <video id="video2" autoplay muted playsinline></video>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase
const firebaseConfig = {
  databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🎬 影片來源
const base = "https://github.com/RSCCT/FGTC328/raw/main/";

// 👉 只保留 idle
const videos = {
  A: base + "idle.mp4",
  B: base + "idle2.mp4",
  C: base + "idle3.mp4"
};

const v1 = document.getElementById("video1");
const v2 = document.getElementById("video2");

// 👉 播放（只播角色）
function play(video, char) {
  const url = videos[char];
  if (!url) return;

  // 避免重複載入
  if (video.src.includes(url)) return;

  video.src = url + "?t=" + Date.now();
  video.play().catch(()=>{});
}

// 🔥 監聽 Firebase
const refAll = ref(db, "/");

onValue(refAll, (snap) => {

  const data = snap.val();
  if (!data) return;

  const p1 = data.player1;
  const p2 = data.player2;

  if (p1) play(v1, p1);
  if (p2) play(v2, p2);

});

</script>

</body>
</html>
