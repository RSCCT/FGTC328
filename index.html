<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ESP32 Video Player</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }
</style>

</head>

<body>

<video id="video" autoplay muted playsinline loop></video>

<script>
const video = document.getElementById("video");

// 👉 GitHub影片（改成你的）
const base = "https://raw.githubusercontent.com/RSCCT/FGTC328/main/";

const videos = {
  idle: base + "idle.mp4",
  idle2: base + "idle2.mp4"
};

// 👉 播放函式
function playVideo(name) {
  const url = videos[name];
  if (!url) return;

  video.pause();
  video.src = url;
  video.load();

  video.play().catch(err => {
    console.log("需要點擊才會播放");
  });
}

// 👉 預設播放
playVideo("idle");

// 👉 WebSocket 連 ESP32
const ws = new WebSocket("ws://" + location.hostname + ":81/");

ws.onmessage = function(event) {
  console.log("收到:", event.data);

  // ESP32 傳：idle 或 idle2
  playVideo(event.data);
};

// 👉 測試模式（先確認畫面用）
let toggle = false;

setInterval(() => {
  toggle = !toggle;

  if (toggle) {
    playVideo("idle");
    console.log("切換 → idle");
  } else {
    playVideo("idle2");
    console.log("切換 → idle2");
  }
}, 3000);

</script>

</body>
</html>
