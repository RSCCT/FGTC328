<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Screen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    height: 100vh;

    /* 🔥 間距增加 1cm */
    gap: calc(10px + 1cm);
  }

  .player {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
  }

  /* 🔥 影片視窗縮小到90% */
  .video-box {
    width: 90%;
    height: 90%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* 🔥 保證影片不超出 */
  video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 不裁切、不溢出 */
    background: black;
  }
</style>
</head>

<body>

<div class="player">
  <div class="video-box">
    <video id="video1" autoplay muted playsinline></video>
  </div>
</div>

<div class="player">
  <div class="video-box">
    <video id="video2" autoplay muted playsinline></video>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase
const firebaseConfig = {
  databaseURL: "https://fightgame-b7536-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🎬 影片來源
const base = "https://github.com/RSCCT/FGTC328/raw/main/";

// 👉 三角色 idle
const videos = {
  A: base + "idle1.mp4",
  B: base + "idle2.mp4",
  C: base + "idle3.mp4"
};

const v1 = document.getElementById("video1");
const v2 = document.getElementById("video2");

// 👉 播放
function play(video, char) {
  const url = videos[char];
  if (!url) return;

  if (video.src.includes(url)) return;

  video.src = url + "?t=" + Date.now();
  video.play().catch(()=>{});
}

// 🔥 監聽 Firebase
const refAll = ref(db, "/");

onValue(refAll, (snap) => {

  const data = snap.val();
  if (!data) return;

  const p1 = data.player1;
  const p2 = data.player2;

  if (p1) play(v1, p1);
  if (p2) play(v2, p2);

});

</script>

</body>
</html>
